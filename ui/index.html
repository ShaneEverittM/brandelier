<body>
  <div id="root"></div>
  <script>
    // Suppress benign ResizeObserver loop warnings that surface as errors
    window.addEventListener('error', (e) => {
      if (e.message && e.message.includes('ResizeObserver loop')) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    });
  </script>
